user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/font-woff2;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Security Headers (shared map) ─────────────────────────────────────────
    map $sent_http_content_type $security_headers {
        default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' https://api.a4k.com;";
    }

    # ── Upstream: Backend ─────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Upstream: Frontend ────────────────────────────────────────────────────
    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name app.a4k.com api.a4k.com;
        return 301 https://$host$request_uri;
    }

    # ── Frontend: app.a4k.com ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name app.a4k.com;

        ssl_certificate     /etc/letsencrypt/live/app.a4k.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.a4k.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/app.a4k.com/chain.pem;

        include /etc/nginx/snippets/ssl-params.conf;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy $security_headers always;

        limit_conn conn 20;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # ── API: api.a4k.com ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.a4k.com;

        ssl_certificate     /etc/letsencrypt/live/api.a4k.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.a4k.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.a4k.com/chain.pem;

        include /etc/nginx/snippets/ssl-params.conf;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        limit_conn conn 50;

        # Auth endpoints — stricter rate limit
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
        }

        # General API
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
        }

        # Docs (disable in production — remove if you want to expose Swagger)
        location ~ ^/(docs|redoc|openapi.json) {
            return 403;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}
