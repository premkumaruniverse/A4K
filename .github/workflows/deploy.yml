name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push Backend", "Build & Push Frontend"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/a4k
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_branch }}" \
              | grep -q "^v" && \
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.workflow_run.head_branch }}/" .env

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
