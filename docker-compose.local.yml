version: "3.9"

networks:
  a4k_local:
    driver: bridge

volumes:
  postgres_local_data:

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: a4k_user
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: airport4kgp
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - a4k_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a4k_user -d airport4kgp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"   # expose locally so you can use pgAdmin / psql

  backend:
    image: a4k-backend:test
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://a4k_user:localpassword@postgres:5432/airport4kgp
      JWT_SECRET: local-dev-secret-key-change-in-production
      JWT_EXPIRE_MINUTES: 10080
      OTP_EXPIRE_SECONDS: 300
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
    networks:
      - a4k_local
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"   # API accessible at http://localhost:8000
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: a4k-frontend:test
    restart: unless-stopped
    networks:
      - a4k_local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"     # App accessible at http://localhost:3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
